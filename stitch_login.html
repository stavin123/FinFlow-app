<!-- Hero Area (Top 35%) -->
<div class="h-[309px] relative flex flex-col items-center justify-center overflow-hidden shrink-0 border-b border-white/5">
<!-- Minimal Gradient Mesh Background -->
<div class="absolute inset-0 bg-surface"></div>
<div class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full bg-primary-container blur-[100px] opacity-15"></div>
<div class="absolute bottom-[-10%] right-[-20%] w-[60%] h-[60%] rounded-full bg-secondary-container blur-[120px] opacity-20"></div>

</div>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">Precision tooling for modern wealth management.</p>
</div>
</div>

<div class="mb-lg text-center sm:text-left">
<h1 class="font-h1 text-h1 text-on-background">Welcome back</h1>
</div>
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="sr-only" for="email">Email</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant group-focus-within:text-primary-container transition-colors" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg py-md pl-[48px] pr-md font-body-md text-body-md text-on-background placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:shadow-[0_0_15px_rgba(0,212,170,0.15)] transition-all" id="email" placeholder="Email address" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="sr-only" for="password">Password</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant group-focus-within:text-primary-container transition-colors" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg py-md pl-[48px] pr-[48px] font-body-md text-body-md text-on-background placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:shadow-[0_0_15px_rgba(0,212,170,0.15)] transition-all" id="password" placeholder="Password" type="password"/>
<button class="absolute right-md text-on-surface-variant hover:text-on-background transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-xs">
<a class="font-label-md text-label-md text-primary-container hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="mt-sm w-full rounded-full bg-gradient-to-r from-primary-container to-secondary-container py-[14px] px-lg flex items-center justify-center border border-white/20 shadow-[0_4px_20px_rgba(0,212,170,0.15)] hover:shadow-[0_4px_25px_rgba(0,212,170,0.3)] active:scale-[0.98] transition-all relative overflow-hidden group" type="submit">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="font-label-md text-label-md text-white tracking-widest uppercase relative z-10">Sign In</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md my-xl opacity-60">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Or</span>
<div class="h-px bg-outline-variant flex-1"></div>

</p>
